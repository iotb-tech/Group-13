<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Anime Movie Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-blue-700 text-white shadow">
        <div class="max-w-7xl mx-auto px-6 py-6">
            <h1 class="text-4xl font-bold">
                Anime Movie Finder 
            </h1>
            <p class="mt-2">
                Find your favourite anime movies and shows.
            </p>
        </div>
    </header>
    <section class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row gap-4">
            <input
                id="searchInput"
                type="text"
                placeholder="Search anime..."
                class="flex-1 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
            <button
                id="searchButton"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg"
            >
                Search
            </button>
        </div>
    </section>
    <div
        id="loading"
        class="hidden text-center text-xl font-bold"
    >
        Loading...
    </div>
    <div
        id="error"
        class="hidden text-center text-red-500 text-xl my-5"
    >
    </div>
    <section class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-3xl font-bold mb-6">
            Search Results
        </h2>
        <div
            id="animeContainer"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        >
        </div>
    </section>
    <section class="max-w-7xl mx-auto px-6 py-10">
        <h2 class="text-3xl font-bold mb-6">
            My Favourites
        </h2>
        <div
            id="favouriteContainer"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        >
        </div>
    </section>
    <div
        id="modal"
        class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-6 z-50"
    >
        <div
            class="bg-white rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto relative p-6"
        >
            <button
                id="closeModal"
                class="absolute top-4 right-4 bg-red-500 text-white px-3 py-2 rounded"
            >
                X
            </button>
            <div id="modalContent">
            </div>
        </div>
    </div>

    <footer class="bg-blue-700 text-white mt-16">
        <div class="max-w-7xl mx-auto px-6 py-6 text-center">
            Anime Movie Finder © 2026
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/favourites.js"></script>
    <script src="js/api.js"></script>
    <script src="js/search.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
